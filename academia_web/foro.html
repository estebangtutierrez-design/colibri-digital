<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foro · Lucas EGA Academy</title>
<link rel="stylesheet" href="style.css">
<style>
  body{background:#0d1117;color:#c9d1d9;font-family:Arial,sans-serif;padding:20px;max-width:900px;margin:auto;}
  h1{color:#f0883e;}
  .hilo{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:15px;margin:10px 0;}
  .hilo:hover{border-color:#58a6ff;}
  .hilo h3{margin:0;color:#58a6ff;}
  .hilo .meta{font-size:12px;color:#8b949e;margin-top:5px;}
  .hilo .curso-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#21262d;color:#f0883e;}
  .comentario{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;margin:6px 0;}
  .comentario .meta{font-size:12px;color:#8b949e;}
  .btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold;}
  .btn:hover{background:#2ea043;}
  textarea,input[type=text]{width:100%;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#fff;margin:6px 0;box-sizing:border-box;}
  textarea:focus,input:focus{outline:none;border-color:#58a6ff;}
  .comentario-form{background:#161b22;padding:15px;border-radius:8px;margin:15px 0;}
  select{padding:8px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;}
</style>
</head>
<body>
<a href="index.html" style="color:#58a6ff;">⬅ Volver a la Academia</a>
<a href="examen.html" style="color:#d29922;margin-left:15px;">📝 Exámenes</a>
<a href="tienda.html" style="color:#3fb950;margin-left:15px;">📚 Tienda</a>
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
  <h1>💬 Foro de la Academia</h1>
  <button class="btn" onclick="mostrarNuevoHilo()">➕ Nuevo Hilo</button>
</div>
<p style="color:#8b949e;">Comparte dudas, proyectos y consejos con otros estudiantes.</p>

<div style="margin:15px 0;">
  <select id="filtroCurso" onchange="cargarHilos()">
    <option value="">📚 Todos los cursos</option>
  </select>
</div>

<div id="nuevoHilo" class="comentario-form" style="display:none;">
  <h3>Crear nuevo hilo</h3>
  <input id="hiloTitulo" placeholder="Título del hilo">
  <select id="hiloCurso"><option value="">Sin curso específico</option></select>
  <textarea id="hiloContenido" rows="4" placeholder="Escribe tu mensaje..."></textarea>
  <button class="btn" onclick="crearHilo()">Publicar</button>
  <button onclick="document.getElementById('nuevoHilo').style.display='none'" style="margin-left:10px;color:#8b949e;cursor:pointer;background:none;border:none;">Cancelar</button>
</div>

<div id="listaHilos"></div>
<div id="hiloDetalle" style="display:none;"></div>

<script>
const API = "";
const TOKEN = localStorage.getItem("token");
let USER = null;
try { USER = JSON.parse(localStorage.getItem("usuario")); } catch(e) {}
const CURSOS = [
  "01_HTML5_LIBRO_MAESTRO","02_CSS3_LIBRO_MAESTRO","03_JAVASCRIPT_LIBRO_MAESTRO",
  "04_TYPESCRIPT_LIBRO_MAESTRO","05_REACT_LIBRO_MAESTRO","06_NODEJS_LIBRO_MAESTRO",
  "07_PHP_LIBRO_MAESTRO","08_SQL_LIBRO_MAESTRO","09_PYTHON_LIBRO_MAESTRO",
  "10_JAVA_LIBRO_MAESTRO","11_C_LIBRO_MAESTRO","12_CPLUSPLUS_LIBRO_MAESTRO",
  "13_CSHARP_LIBRO_MAESTRO","14_GO_LIBRO_MAESTRO","15_RUBY_LIBRO_MAESTRO"
];
const NOMBRES = { "01_HTML5_LIBRO_MAESTRO":"HTML5","02_CSS3_LIBRO_MAESTRO":"CSS3","03_JAVASCRIPT_LIBRO_MAESTRO":"JavaScript",
  "04_TYPESCRIPT_LIBRO_MAESTRO":"TypeScript","05_REACT_LIBRO_MAESTRO":"React","06_NODEJS_LIBRO_MAESTRO":"Node.js",
  "07_PHP_LIBRO_MAESTRO":"PHP","08_SQL_LIBRO_MAESTRO":"SQL","09_PYTHON_LIBRO_MAESTRO":"Python",
  "10_JAVA_LIBRO_MAESTRO":"Java","11_C_LIBRO_MAESTRO":"C","12_CPLUSPLUS_LIBRO_MAESTRO":"C++",
  "13_CSHARP_LIBRO_MAESTRO":"C#","14_GO_LIBRO_MAESTRO":"Go","15_RUBY_LIBRO_MAESTRO":"Ruby" };

// Poblar selects
for (const c of CURSOS) {
  const opt1 = document.createElement("option"); opt1.value = c; opt1.textContent = NOMBRES[c];
  document.getElementById("filtroCurso").appendChild(opt1);
  const opt2 = document.createElement("option"); opt2.value = c; opt2.textContent = NOMBRES[c];
  document.getElementById("hiloCurso").appendChild(opt2);
}

async function apiGet(path) {
  const r = await fetch(API + path, {headers: TOKEN ? {"Authorization":"Bearer "+TOKEN} : {}});
  return r.json();
}
async function apiPost(path, data) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: {"Content-Type":"application/json", ...(TOKEN ? {"Authorization":"Bearer "+TOKEN} : {})},
    body: JSON.stringify(data)
  });
  return r.json();
}

async function cargarHilos() {
  const curso = document.getElementById("filtroCurso").value;
  const url = curso ? "/api/foro/hilos?curso=" + curso : "/api/foro/hilos";
  const data = await apiGet(url);
  const div = document.getElementById("listaHilos");
  if (!data.length) { div.innerHTML = '<p style="color:#8b949e;">No hay hilos aún. ¡Sé el primero en preguntar!</p>'; return; }
  div.innerHTML = data.map(h => `
    <div class="hilo" style="cursor:pointer;" onclick="verHilo(${h.id})">
      <h3>${h.titulo}</h3>
      <div class="meta">👤 ${h.autor_nombre} · 🗓️ ${h.fecha} · 💬 ${h.num_comentarios || 0} respuestas
        ${h.curso_id ? ` <span class="curso-tag">${NOMBRES[h.curso_id] || h.curso_id}</span>` : ''}</div>
    </div>
  `).join('');
}

async function verHilo(id) {
  const data = await apiGet("/api/foro/hilos/" + id);
  document.getElementById("listaHilos").style.display = "none";
  const detalle = document.getElementById("hiloDetalle");
  detalle.style.display = "block";
  detalle.innerHTML = `
    <a href="#" onclick="volverLista()" style="color:#58a6ff;">⬅ Volver al foro</a>
    <h2>${data.hilo.titulo}</h2>
    <div style="color:#8b949e;font-size:13px;">👤 ${data.hilo.autor_nombre} · ${data.hilo.fecha}</div>
    <div style="background:#161b22;border-radius:8px;padding:15px;margin:15px 0;white-space:pre-wrap;">${escapeHtml(data.hilo.contenido)}</div>
    <h3>💬 Respuestas (${data.comentarios.length})</h3>
    ${data.comentarios.map(c => `
      <div class="comentario">
        <div class="meta">👤 ${c.autor_nombre} · ${c.fecha}</div>
        <div style="white-space:pre-wrap;margin-top:6px;">${escapeHtml(c.contenido)}</div>
      </div>
    `).join('')}
    ${TOKEN ? `
    <div class="comentario-form">
      <h4>Responder</h4>
      <textarea id="respuestaContenido" rows="3" placeholder="Escribe tu respuesta..."></textarea>
      <button class="btn" onclick="responder(${id})">Enviar</button>
    </div>` : '<p style="color:#8b949e;">🔑 <a href="index.html" style="color:#58a6ff;">Inicia sesión</a> para responder.</p>'}
  `;
}

function volverLista() {
  document.getElementById("listaHilos").style.display = "block";
  document.getElementById("hiloDetalle").style.display = "none";
}

function mostrarNuevoHilo() {
  if (!TOKEN) { alert("Debes iniciar sesión para crear un hilo."); return; }
  document.getElementById("nuevoHilo").style.display = "block";
}

async function crearHilo() {
  const titulo = document.getElementById("hiloTitulo").value.trim();
  const contenido = document.getElementById("hiloContenido").value.trim();
  const curso = document.getElementById("hiloCurso").value;
  if (!titulo || !contenido) { alert("Completa todos los campos"); return; }
  await apiPost("/api/foro/hilos", {titulo, contenido, curso_id: curso || null});
  document.getElementById("nuevoHilo").style.display = "none";
  document.getElementById("hiloTitulo").value = "";
  document.getElementById("hiloContenido").value = "";
  cargarHilos();
}

async function responder(hiloId) {
  const contenido = document.getElementById("respuestaContenido").value.trim();
  if (!contenido) { alert("Escribe tu respuesta"); return; }
  await apiPost("/api/foro/comentarios", {hilo_id: hiloId, contenido});
  document.getElementById("respuestaContenido").value = "";
  verHilo(hiloId);
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

cargarHilos();
</script>
</body></html>
