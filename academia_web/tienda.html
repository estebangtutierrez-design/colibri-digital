<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Oficial · Lucas EGA Academy</title>
<link rel="stylesheet" href="style.css">
<style>
  body{background:#0d1117;color:#c9d1d9;font-family:Arial,sans-serif;padding:20px;max-width:1200px;margin:auto;}
  h1{color:#f0883e;border-bottom:2px solid #30363d;padding-bottom:10px;}
  .subtitle{color:#8b949e;margin-bottom:25px;}
  .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin:20px 0;}
  .book-card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;transition:all .2s;display:flex;flex-direction:column;}
  .book-card:hover{border-color:#d29922;transform:translateY(-2px);}
  .book-header{padding:20px 20px 10px;text-align:center;}
  .book-icon{font-size:48px;margin-bottom:10px;}
  .book-title{font-size:18px;font-weight:bold;color:#58a6ff;}
  .book-level{font-size:12px;color:#8b949e;margin-top:4px;}
  .book-body{padding:0 20px;flex:1;}
  .book-desc{font-size:13px;color:#8b949e;line-height:1.5;margin:10px 0;}
  .book-incluye{font-size:12px;color:#3fb950;}
  .book-footer{padding:15px 20px;border-top:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;}
  .book-price{font-size:24px;font-weight:bold;color:#d29922;}
  .book-price small{font-size:13px;color:#8b949e;}
  .btn-comprar{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:14px;}
  .btn-comprar:hover{background:#2ea043;}
  .btn-comprar.owned{background:#21262d;color:#3fb950;border:1px solid #3fb950;cursor:default;}
  .filters{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;}
  .filter-btn{padding:8px 16px;border:1px solid #30363d;border-radius:20px;background:transparent;color:#c9d1d9;cursor:pointer;font-size:13px;}
  .filter-btn.active{background:#d29922;color:#000;border-color:#d29922;font-weight:bold;}
  .filter-btn:hover{border-color:#58a6ff;}
  .purchase-msg{position:fixed;top:20px;right:20px;background:#238636;color:#fff;padding:15px 25px;border-radius:8px;z-index:999;animation:fadeOut 3s forwards;}
  @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateY(-20px);}}
  .nav-links{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
  .nav-links a{color:#8b949e;text-decoration:none;font-size:14px;}
  .nav-links a:hover{color:#58a6ff;}
  .biblioteca{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin:20px 0;}
  .biblioteca h2{color:#3fb950;font-size:18px;margin:0 0 15px;}
  .biblioteca-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #21262d;}
  .biblioteca-item:last-child{border-bottom:none;}
  .biblioteca-item .fecha{color:#8b949e;font-size:12px;}
  #loading{text-align:center;padding:40px;color:#8b949e;}
</style>
</head>
<body>
<nav class="nav-links">
  <a href="index.html">⬅ Academia</a>
  <a href="lector.html">📚 Aula</a>
  <a href="examen.html">📝 Exámenes</a>
  <a href="planes.html">📋 Planes</a>
  <a href="perfil.html">👤 Perfil</a>
</nav>

<h1>📚 Tienda Oficial — Lucas EGA Press</h1>
<p class="subtitle">Ediciones oficiales de cada curso. Incluyen PDF profesional, código fuente, ejercicios resueltos y actualizaciones gratuitas por un año.</p>

<div class="filters">
  <button class="filter-btn active" onclick="filtrar('todas')">Todas</button>
  <button class="filter-btn" onclick="filtrar('1')">Fundamentos</button>
  <button class="filter-btn" onclick="filtrar('2')">Front-End</button>
  <button class="filter-btn" onclick="filtrar('3')">Full Stack</button>
  <button class="filter-btn" onclick="filtrar('4')">Profesional</button>
</div>

<div id="biblioteca" style="display:none;"></div>
<div id="storeGrid"><div id="loading">⏳ Cargando tienda...</div></div>

<script>
const API = "";
const TOKEN = localStorage.getItem("token");

async function api(path, opts={}) {
  const headers = {"Authorization":"Bearer "+TOKEN, ...(opts.body?{"Content-Type":"application/json"}:{})};
  const r = await fetch(API+path, {...opts, headers});
  return r.json();
}

let libros = [];
let owned = [];

async function cargar() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("ok")) {
    document.getElementById("biblioteca").style.display = "block";
    document.getElementById("biblioteca").innerHTML = '<div class="purchase-msg">✅ ¡Compra realizada con éxito!</div>';
    setTimeout(() => { window.history.replaceState({}, "", "/tienda.html"); }, 100);
  }

  const [librosData, biblioData] = await Promise.all([
    api("/api/tienda/libros"),
    TOKEN ? api("/api/tienda/biblioteca") : Promise.resolve([])
  ]);
  libros = librosData;
  owned = TOKEN ? (biblioData.error ? [] : biblioData.map(b => b.libro_id)) : [];

  if (TOKEN && biblioData.length > 0 && !biblioData.error) {
    document.getElementById("biblioteca").style.display = "block";
    document.getElementById("biblioteca").innerHTML = `
      <h2>📖 Mi Biblioteca (${biblioData.length} libros)</h2>
      ${biblioData.map(b => `
        <div class="biblioteca-item">
          <div><strong>${b.titulo}</strong></div>
          <div class="fecha">Comprado el ${b.fecha ? b.fecha.slice(0,10) : '-'}</div>
        </div>
      `).join('')}
    `;
  }
  renderizar();
}

function renderizar(nivelFiltro) {
  const grid = document.getElementById("storeGrid");
  const nivelMap = ["","Fundamentos","Front-End","Full Stack","Profesional"];
  const iconos = ["📕","📗","📘","📙","📕"];
  const filtrados = nivelFiltro && nivelFiltro !== 'todas'
    ? libros.filter(l => l.nivel == nivelFiltro) : libros;
  if (filtrados.length === 0) {
    grid.innerHTML = '<p style="color:#8b949e;text-align:center;padding:40px;">No hay libros en esta categoría.</p>';
    return;
  }
  grid.innerHTML = filtrados.map(l => {
    const esDueno = owned.includes(l.id);
    return `<div class="book-card">
      <div class="book-header">
        <div class="book-icon">${iconos[l.nivel]||"📕"}</div>
        <div class="book-title">${l.titulo}</div>
        <div class="book-level">${nivelMap[l.nivel]||''} · Nivel ${l.nivel}</div>
      </div>
      <div class="book-body">
        <div class="book-desc">${l.descripcion}</div>
        <div class="book-incluye">✅ ${l.incluye}</div>
      </div>
      <div class="book-footer">
        <div class="book-price">$${l.precio.toFixed(2)} <small>${l.moneda.toUpperCase()}</small></div>
        <button class="btn-comprar ${esDueno?'owned':''}" onclick="${esDueno?'':'comprar(\''+l.id+'\',\''+l.titulo+'\')'}" ${esDueno?'disabled':''}>
          ${esDueno ? '✅ En tu biblioteca' : 'Comprar'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function filtrar(nivel) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderizar(nivel);
}

async function comprar(libroId, titulo) {
  if (!TOKEN) { alert("Debes iniciar sesión para comprar"); window.location="index.html"; return; }
  const btn = event.target;
  btn.textContent = "⏳ Procesando...";
  btn.disabled = true;
  const r = await api("/api/tienda/comprar", {method:"POST", body:JSON.stringify({libro_id: libroId})});
  if (r.url) {
    window.location.href = r.url;
  } else if (r.mensaje) {
    owned.push(libroId);
    renderizar();
    document.getElementById("biblioteca").style.display = "block";
    document.getElementById("biblioteca").innerHTML = `<div class="purchase-msg">${r.mensaje}</div>`;
    cargar();
  } else {
    alert(r.error || "Error al procesar la compra");
    btn.textContent = "Comprar";
    btn.disabled = false;
  }
}

cargar();
</script>
</body>
</html>
