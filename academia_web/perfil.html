<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil del Alumno - Lucas EGA Academy</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:#0d1117;color:white;font-family:Arial,sans-serif;}
.perfil-card{background:linear-gradient(145deg,#161b22,#0d1117);padding:40px;border-radius:22px;max-width:1000px;margin:30px auto;border:2px solid #58a6ff;box-shadow:0 0 35px rgba(88,166,255,.35);}
.perfil-card h1{color:#58a6ff;font-size:46px;font-weight:900;text-align:center;letter-spacing:2px;text-shadow:0 0 15px rgba(88,166,255,.8);}
.subtitulo{text-align:center;font-size:20px;color:#c9d1d9;margin-bottom:30px;}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:25px;}
.info{background:#21262d;padding:22px;border-radius:16px;border:1px solid #30363d;box-shadow:0 0 15px rgba(0,0,0,.35);font-size:18px;}
.info strong{color:#79c0ff;font-size:20px;}
.dato{display:block;margin-top:10px;font-size:25px;font-weight:900;color:#ffffff;}
input{padding:13px;border-radius:10px;border:none;font-size:16px;width:65%;margin-top:10px;background:#0d1117;color:#fff;border:1px solid #30363d;}
button{padding:13px 22px;border:none;border-radius:10px;background:#2ea043;color:white;font-weight:bold;cursor:pointer;font-size:16px;transition:.3s;}
button:hover{transform:scale(1.05);background:#3fb950;}
.barra{width:100%;height:28px;background:#30363d;border-radius:30px;overflow:hidden;margin-top:15px;}
.barra-progreso{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#58a6ff,#a371f7);border-radius:30px;transition:width 1s ease;}
.estado-badge{display:inline-block;padding:12px 20px;border-radius:30px;background:#238636;font-weight:900;font-size:20px;margin-top:10px;}
.cursos-lista{margin-top:30px;background:#161b22;padding:25px;border-radius:18px;border:1px solid #30363d;}
.cursos-lista h2{color:#58a6ff;font-size:32px;text-align:center;margin-bottom:20px;}
.curso-item{display:flex;justify-content:space-between;align-items:center;background:#21262d;padding:16px 20px;margin:12px 0;border-radius:12px;font-size:20px;font-weight:800;}
.curso-item .badge{font-size:14px;font-weight:normal;padding:4px 12px;border-radius:20px;}
.badge-completed{background:#238636;color:#fff;}
.badge-progress{background:#d29922;color:#0d1117;}
.badge-pending{background:#30363d;color:#8b949e;}
.completado{color:#3fb950;}
.en-progreso{color:#d29922;}
.pendiente{color:#8b949e;}
.volver{color:#58a6ff;font-size:18px;font-weight:bold;text-decoration:none;}
#resetBtn{background:#da3633;margin-left:10px;}
#resetBtn:hover{background:#f85149;}
.logros-grid{display:flex;flex-wrap:wrap;gap:10px;margin:15px 0;}
.logro-item{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 15px;font-size:14px;}
</style>
</head>
<body>
<section class="section">
<a href="index.html" class="volver">⬅ Volver a la Academia</a>
<a href="examen.html" class="volver" style="margin-left:15px;">📝 Exámenes</a>
<div class="perfil-card">
<h1>👨‍🎓 PERFIL DEL ALUMNO</h1>
<p class="subtitulo">Dashboard Lucas EGA Academy</p>
<div class="info">
<strong>Nombre del Alumno:</strong><br>
<input id="nombreInput" placeholder="Escribe tu nombre">
<button onclick="guardarNombre()">Guardar</button>
<button id="resetBtn" onclick="resetearProgreso()">🗑 Reiniciar progreso</button>
</div>
<div class="dashboard">
<div class="info">
<strong>Último Curso</strong>
<span class="dato" id="cursoActual">Sin datos</span>
</div>
<div class="info">
<strong>Capítulo Actual</strong>
<span class="dato" id="capituloActual">0</span>
</div>
<div class="info">
<strong>Progreso General</strong>
<span class="dato" id="progresoActual">0%</span>
<div class="barra">
<div class="barra-progreso" id="barraProgreso"></div>
</div>
</div>
<div class="info">
<strong>Estado</strong><br>
<span class="estado-badge" id="estadoAlumno">En formación</span>
</div>
<div class="info">
<strong>Nivel</strong>
<span class="dato" id="nivelAlumno">🥉 Principiante</span>
</div>
<div class="info">
<strong>Cursos Completados</strong>
<span class="dato" id="certificadosAlumno">0</span>
</div>
</div>
<div class="cursos-lista">
<h2>📚 Ruta de Formación (15 cursos)</h2>
<div id="listaCursos"></div>
</div>
<div class="cursos-lista" id="logrosSection" style="display:none;">
<h2>🏆 Logros</h2>
<div class="logros-grid" id="logrosGrid"></div>
</div>
<div class="cursos-lista">
<h2>🏅 Leaderboard</h2>
<div id="leaderboardList" style="font-size:14px;color:#8b949e;"></div>
</div>
</div>
</section>
<script>
const CURSOS = [
  {id:"01_HTML5_LIBRO_MAESTRO", nombre:"HTML5", icono:"🌐", nivel:1},
  {id:"02_CSS3_LIBRO_MAESTRO", nombre:"CSS3", icono:"🎨", nivel:1},
  {id:"03_JAVASCRIPT_LIBRO_MAESTRO", nombre:"JavaScript", icono:"⚡", nivel:1},
  {id:"04_TYPESCRIPT_LIBRO_MAESTRO", nombre:"TypeScript", icono:"🔷", nivel:2},
  {id:"05_REACT_LIBRO_MAESTRO", nombre:"React", icono:"⚛️", nivel:2},
  {id:"06_NODEJS_LIBRO_MAESTRO", nombre:"Node.js", icono:"🟢", nivel:3},
  {id:"07_PHP_LIBRO_MAESTRO", nombre:"PHP", icono:"🐘", nivel:3},
  {id:"08_SQL_LIBRO_MAESTRO", nombre:"SQL", icono:"🗄️", nivel:3},
  {id:"09_PYTHON_LIBRO_MAESTRO", nombre:"Python", icono:"🐍", nivel:4},
  {id:"10_JAVA_LIBRO_MAESTRO", nombre:"Java", icono:"☕", nivel:4},
  {id:"11_C_LIBRO_MAESTRO", nombre:"C", icono:"🔵", nivel:4},
  {id:"12_CPLUSPLUS_LIBRO_MAESTRO", nombre:"C++", icono:"🔷", nivel:4},
  {id:"13_CSHARP_LIBRO_MAESTRO", nombre:"C#", icono:"💠", nivel:4},
  {id:"14_GO_LIBRO_MAESTRO", nombre:"Go", icono:"🚀", nivel:4},
  {id:"15_RUBY_LIBRO_MAESTRO", nombre:"Ruby", icono:"💎", nivel:4},
];

function cargarProgreso() {
  const nombre = localStorage.getItem("nombre_alumno") || "";
  if (nombre) document.getElementById("nombreInput").value = nombre;

  const ultimoCurso = localStorage.getItem("curso_actual") || "Sin datos";
  const cap = Number(localStorage.getItem("capitulo_actual")) || 0;
  const total = Number(localStorage.getItem("total_capitulos")) || 0;
  const pct = Number(localStorage.getItem("porcentaje_actual")) || 0;

  document.getElementById("cursoActual").innerText = ultimoCurso;
  document.getElementById("capituloActual").innerText = cap + " de " + total;

  let completados = 0;
  let totalProgreso = 0;
  let cursosConDatos = 0;
  let html = "";

  for (const c of CURSOS) {
    const key = "progreso_" + c.id;
    let data = null;
    try {
      const raw = localStorage.getItem(key);
      if (raw) data = JSON.parse(raw);
    } catch(e) {}

    let estado, badge, clase;
    if (data && data.porcentaje >= 100) {
      estado = "✅ Completado";
      badge = `<span class="badge badge-completed">100%</span>`;
      clase = "completado";
      completados++;
      totalProgreso += 100;
      cursosConDatos++;
    } else if (data && data.porcentaje > 0) {
      estado = `📖 Cap. ${data.capitulo}/${data.total} (${data.porcentaje}%)`;
      badge = `<span class="badge badge-progress">${data.porcentaje}%</span>`;
      clase = "en-progreso";
      totalProgreso += data.porcentaje;
      cursosConDatos++;
    } else {
      estado = "🔒 Pendiente";
      badge = `<span class="badge badge-pending">0%</span>`;
      clase = "pendiente";
    }

    const levelIcon = ["","🟢","🔵","🟣","🟠"];
    html += `<div class="curso-item">
      <span>${c.icono} ${c.nombre} <span style="font-size:12px;color:#8b949e;">${levelIcon[c.nivel]} Nivel ${c.nivel}</span></span>
      <span class="${clase}">${badge}</span>
    </div>`;
  }

  document.getElementById("listaCursos").innerHTML = html;

  const pctGeneral = cursosConDatos > 0 ? Math.round(totalProgreso / CURSOS.length) : 0;
  document.getElementById("progresoActual").innerText = pctGeneral + "%";
  document.getElementById("barraProgreso").style.width = pctGeneral + "%";
  document.getElementById("certificadosAlumno").innerText = completados;

  let nivelLabel = "";
  if (completados >= 15) {
    document.getElementById("estadoAlumno").innerText = "🏆 Academia Completa";
    nivelLabel = "🏅 Arquitecto de Software · 🟠 Nivel 4";
  } else if (completados >= 8) {
    document.getElementById("estadoAlumno").innerText = "📚 Nivel 4 activo";
    nivelLabel = "🟠 Programación Profesional";
  } else if (completados >= 5) {
    document.getElementById("estadoAlumno").innerText = "📚 Nivel 3 activo";
    nivelLabel = "🟣 Full Stack";
  } else if (completados >= 3) {
    document.getElementById("estadoAlumno").innerText = "📚 Nivel 2 activo";
    nivelLabel = "🔵 Front-End";
  } else if (completados > 0) {
    document.getElementById("estadoAlumno").innerText = "📚 Nivel 1 activo";
    nivelLabel = "🟢 Fundamentos";
  } else {
    document.getElementById("estadoAlumno").innerText = "🦉 En formación";
    nivelLabel = "🥉 Principiante";
  }
  document.getElementById("nivelAlumno").innerText = nivelLabel;

  if (USER) {
    fetch(API + "/api/auth/me", {headers: {"Authorization": "Bearer " + TOKEN}})
      .then(r => r.json()).then(d => {
        if (d.logros && d.logros.length) {
          document.getElementById("logrosSection").style.display = "block";
          document.getElementById("logrosGrid").innerHTML = d.logros.map(l =>
            `<div class="logro-item">${l.icono} ${l.nombre}</div>`
          ).join('');
        }
        if (d.usuario) {
          document.getElementById("certificadosAlumno").innerText = completados;
        }
      }).catch(() => {});
  }

  fetch(API + "/api/leaderboard").then(r => r.json()).then(data => {
    const div = document.getElementById("leaderboardList");
    if (!data.length) { div.innerHTML = "Aún no hay estudiantes en el leaderboard."; return; }
    let html = "<table style='width:100%;border-collapse:collapse;'>";
    html += "<tr style='color:#8b949e;font-size:12px;'><th>#</th><th>Nombre</th><th>Puntos</th><th>Cursos</th><th>Racha</th></tr>";
    data.forEach((u, i) => {
      const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i + 1);
      html += `<tr style="border-bottom:1px solid #21262d;"><td style="padding:8px;">${medal}</td><td>${u.nombre}</td><td>${u.puntos}</td><td>${u.cursos_completados}</td><td>${u.racha_dias || 0} días</td></tr>`;
    });
    html += "</table>";
    div.innerHTML = html;
  }).catch(() => {});
}

function guardarNombre() {
  const nombre = document.getElementById("nombreInput").value.trim();
  localStorage.setItem("nombre_alumno", nombre);
  alert("✅ Nombre guardado correctamente");
}

function resetearProgreso() {
  if (!confirm("¿Estás seguro? Se borrará todo el progreso de todos los cursos.")) return;
  for (const c of CURSOS) {
    localStorage.removeItem("progreso_" + c.id);
  }
  localStorage.removeItem("curso_actual");
  localStorage.removeItem("capitulo_actual");
  localStorage.removeItem("total_capitulos");
  localStorage.removeItem("nombre_capitulo");
  localStorage.removeItem("porcentaje_actual");
  localStorage.removeItem("ultimo_curso_id");
  cargarProgreso();
  alert("🗑 Progreso reiniciado");
}

cargarProgreso();
</script>
</body>
</html>
