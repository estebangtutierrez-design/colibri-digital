{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}
{% block content %}
<main>
<div class="container" style="max-width:900px">
  <h1 style="font-size:26px;color:#1a1a2e;margin-bottom:30px">🛒 Finalizar Pedido</h1>

  <div id="carrito-vacio" style="display:none;text-align:center;padding:60px 20px">
    <div style="font-size:64px;margin-bottom:15px">🛒</div>
    <h2 style="color:#1a1a2e;margin-bottom:10px">Tu carrito está vacío</h2>
    <a href="/tienda" class="btn" style="background:#d4a574;color:#1a1a2e">Ver Tienda</a>
  </div>

  <div id="checkout-content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:30px">
      <div>
        <h2 style="font-size:18px;color:#1a1a2e;margin-bottom:15px">Resumen</h2>
        <div id="items-carrito"></div>
        <div id="totales" style="margin-top:20px;padding:16px;background:#fcf9f6;border-radius:12px;border:1px solid #f0ede8"></div>
      </div>
      <div>
        <h2 style="font-size:18px;color:#1a1a2e;margin-bottom:15px">Envío</h2>
        <form id="form-pedido" style="display:flex;flex-direction:column;gap:12px">
          <input type="text" name="nombre" placeholder="Nombre completo" required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
          <input type="email" name="email" placeholder="Correo electrónico" required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
          <input type="tel" name="telefono" placeholder="Teléfono" style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
          <textarea name="direccion" placeholder="Dirección (calle, número, colonia)" required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;min-height:70px;outline:none;resize:vertical"></textarea>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px">
            <input type="text" name="ciudad" placeholder="Ciudad" required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
            <input type="text" name="estado" placeholder="Estado" required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
            <input type="text" name="cp" placeholder="C.P." required style="padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;outline:none">
          </div>
          <hr style="border:none;border-top:1px solid #f0ede8;margin:10px 0">
          <p style="font-size:14px;color:#1a1a2e;font-weight:bold">Método de pago</p>
          <label style="display:flex;align-items:center;gap:10px;padding:12px;border:2px solid #e0ddd8;border-radius:8px;cursor:pointer">
            <input type="radio" name="metodo_pago" value="transferencia" checked>
            <div><strong>Transferencia bancaria</strong><br><small style="color:#999">Te enviaremos los datos</small></div>
          </label>
          <p style="font-size:11px;color:#c0392b;margin-top:12px;text-align:center">⚠️ No aceptamos devoluciones. Al confirmar aceptas la política.</p>
          <button type="submit" class="btn" id="btn-pagar" style="background:#d4a574;color:#1a1a2e;padding:16px;font-size:16px;margin-top:10px">Confirmar Pedido</button>
        </form>
        <p id="form-error" style="color:#c0392b;font-size:13px;margin-top:10px;display:none"></p>
      </div>
    </div>
  </div>
</div>
</main>

<script>
let carritoData = null;

async function cargarCarrito() {
  const res = await api('GET', '/tienda/api/carrito');
  carritoData = res;
  const el = document.getElementById('items-carrito');
  const vacio = document.getElementById('carrito-vacio');
  const checkout = document.getElementById('checkout-content');
  if (!res.items || res.items.length === 0) {
    vacio.style.display = 'block'; checkout.style.display = 'none'; return;
  }
  vacio.style.display = 'none'; checkout.style.display = 'block';
  el.innerHTML = res.items.map(item => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0ede8">
      <div><strong style="font-size:14px">${item.titulo}</strong><br><small style="color:#999">${item.cantidad} × $${item.precio}</small></div>
      <div style="text-align:right"><strong>$${item.subtotal}</strong><br><button class="btn-eliminar" data-id="${item.id}" style="background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer">Eliminar</button></div>
    </div>
  `).join('');
  document.querySelectorAll('.btn-eliminar').forEach(b => b.addEventListener('click', async () => {
    await api('DELETE', '/tienda/api/carrito', {id: b.dataset.id});
    window.location.reload();
  }));
  document.getElementById('totales').innerHTML = `
    <div style="display:flex;justify-content:space-between"><span>Subtotal</span><strong>$${res.total}</strong></div>
    <div style="display:flex;justify-content:space-between"><span>Envío</span><strong style="color:${res.envio===0?'#2d7d46':'#8b4513'}">${res.envio===0?'GRATIS':'$'+res.envio}</strong></div>
    <hr style="border:none;border-top:2px solid #1a1a2e;margin:8px 0">
    <div style="display:flex;justify-content:space-between;font-size:18px"><strong>Total</strong><strong style="color:#8b4513">$${res.gran_total}</strong></div>`;
}

document.getElementById('form-pedido')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const btn = document.getElementById('btn-pagar');
  const err = document.getElementById('form-error');
  btn.disabled = true; btn.textContent = '⏳ Procesando...'; err.style.display = 'none';
  const res = await api('POST', '/tienda/api/pedido', data);
  if (res.error) { err.textContent = res.error; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Confirmar Pedido'; return; }
  window.location.href = '/tienda/gracias/' + res.pedido_id;
});

cargarCarrito();
</script>
{% endblock %}
