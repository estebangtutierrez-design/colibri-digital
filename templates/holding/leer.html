{% extends 'base.html' %}
{% block title %}{{ contenido.titulo }}{% endblock %}
{% block content %}
<main>
<section style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:#e8d5b7;padding:60px 24px;text-align:center">
  <h1 style="font-size:28px">📖 {{ contenido.titulo }}</h1>
  <p style="color:#c4b998;margin-top:8px">{{ contenido.division_nombre }} · Contenido gratuito</p>
</section>
<div class="container" style="max-width:800px">
  <div style="font-size:15px;line-height:1.8;color:#2d2a24;white-space:pre-wrap">{{ contenido.contenido_texto }}</div>
  <div style="margin-top:30px;text-align:center">
    <a href="/biblioteca" class="btn" style="background:#d4a574;color:#1a1a2e">← Volver a Biblioteca</a>
  </div>
</div>
</main>
{% endblock %}
