<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Colibrí Digital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login{background:#fff;padding:40px;border-radius:16px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login h1{color:#1a1a2e;margin-bottom:5px}
.login p{color:#999;margin-bottom:25px;font-size:14px}
input{width:100%;padding:12px;border:2px solid #e0ddd8;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
input:focus{border-color:#d4a574}
button{width:100%;padding:12px;background:#d4a574;color:#1a1a2e;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
button:hover{background:#c49560}
.error{background:#ffebee;color:#c0392b;padding:10px;border-radius:8px;font-size:13px;margin-bottom:15px;text-align:center}
.admin-footer{text-align:center;margin-top:20px;font-size:12px;color:#666}
</style>
</head>
<body>
<div class="login">
  <h1>📚 Colibrí Admin</h1>
  <p>Ecosistema Digital · Panel Central</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/admin/login">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar al Panel</button>
  </form>
  <div class="admin-footer">Colibrí Digital · Esteban Gutiérrez</div>
</div>
</body>
</html>
